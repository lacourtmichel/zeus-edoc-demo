#nav-links a:hover, #nav-links a.active { color:var(--c-primary); }
.lang-btn {

  cursor:pointer; font-family:'Barlow',sans-serif; font-size:.78rem; font-weight:600;

.reg-list li::before { content:'›'; position:absolute; left:0; color:var(--acc,var(--c-primary)); font-weight:700; }

.s-dark  { background: var(--c-dark); }

/* Reveal on scroll */
.rv { opacity:0; transform:translateY(28px); transition:opacity .7s ease, transform .7s ease; }
.rv.vis { opacity:1; transform:none; }

/* ── HERO ── */
#hero {
  background:
    radial-gradient(ellipse 80% 55% at 65% 35%, rgba(237,109,2,.13) 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 8%  80%, rgba(0,137,123,.1)  0%, transparent 60%),
    var(--c-dark);
  text-align:center;
}
.hero-eye {
  font-size:.7rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase;
  color:var(--c-primary);
  opacity:0; animation:fadeUp .8s .2s ease forwards;
}
.hero-h1 {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(3.2rem,8vw,7rem); font-weight:800;
  line-height:.95; letter-spacing:-.02em; max-width:900px;
  opacity:0; animation:fadeUp .9s .35s ease forwards;
}
.hero-h1 em { color:var(--c-primary); font-style:normal; }
.hero-sub-txt {
  margin-top:24px; font-size:1.05rem; font-weight:300;
  color:rgba(255,255,255,.5); max-width:500px; line-height:1.65;
  opacity:0; animation:fadeUp .9s .5s ease forwards;
}
.hero-cta {
  margin-top:44px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
  opacity:0; animation:fadeUp .9s .65s ease forwards;
}
.btn-p {
  background:var(--c-primary); color:#fff;
  padding:12px 34px; border-radius:30px;
  font-family:'Barlow',sans-serif; font-size:.88rem; font-weight:600;
  text-decoration:none; letter-spacing:.04em; text-transform:uppercase;
  transition:transform .2s, box-shadow .2s;
}
.btn-p:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(237,109,2,.3); }
.btn-o {
  border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.65);
  padding:12px 34px; border-radius:30px;
  font-family:'Barlow',sans-serif; font-size:.88rem; font-weight:500;
  text-decoration:none; letter-spacing:.04em; text-transform:uppercase;
  transition:border-color .2s, color .2s;
}
.btn-o:hover { border-color:var(--c-primary); color:#fff; }
.hero-scroll {
  position:absolute; bottom:32px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  color:rgba(255,255,255,.25); font-size:.68rem; letter-spacing:.12em; text-transform:uppercase;
  animation:bounce 2s infinite;
}
.scroll-ln { width:1px; height:36px; background:linear-gradient(to bottom, var(--c-primary), transparent); }

/* ── REGULACION ── */
.reg-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:22px; width:100%; max-width:1020px; }
.reg-card {
  border-radius:6px; padding:38px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  transition:transform .3s, box-shadow .3s;
}
.reg-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(0,0,0,.4); }
.reg-flag { font-size:2rem; margin-bottom:14px; display:block; }
.reg-name { font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:4px; letter-spacing:.02em; }
.reg-sub  { font-size:.78rem; color:rgba(255,255,255,.38); margin-bottom:22px; }
.cd-row   { display:flex; gap:10px; align-items:flex-end; margin-bottom:22px; }
.cd-unit  { text-align:center; }
.cd-n     { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:2.8rem; line-height:1; display:block; }
.cd-lbl   { font-size:.58rem; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.3); display:block; margin-top:3px; }
.cd-sep   { font-family:'Barlow Condensed',sans-serif; font-size:2rem; font-weight:300; color:rgba(255,255,255,.18); padding-bottom:10px; }
.reg-list { list-style:none; display:flex; flex-direction:column; gap:9px; }
.reg-list li {
  font-size:.86rem; line-height:1.55; color:#fff;
  padding-left:18px; position:relative;
}
.reg-badge {
  display:inline-block; margin-top:18px;
  font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  padding:5px 14px; border-radius:100px;
}
.reg-note {
  background:rgba(237,109,2,.1); border:1px solid rgba(237,109,2,.25);
  border-radius:6px; padding:20px 28px;
  font-size:.86rem; line-height:1.7; color:rgba(255,255,255,.7);
  max-width:900px; text-align:center;
}
.reg-note strong { color:var(--c-primary); }

/* ── ACTORES ── */
.actors-row { display:flex; width:100%; max-width:1100px; align-items:stretch; }
.actor-card {
  flex:1; padding:38px 30px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  transition:transform .3s, background .3s, border-color .3s; cursor:default;
}
.actor-card:first-child { border-radius:6px 0 0 6px; }
.actor-card:last-child  { border-radius:0 6px 6px 0; }
.actor-card:hover       { background:rgba(255,255,255,.07); transform:translateY(-5px); border-color:rgba(0,66,131,.5); }
.actor-ico {
  width:50px; height:50px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; margin-bottom:18px;
}
.a-role { font-size:.63rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; margin-bottom:6px; }
.a-name { font-family:'Barlow Condensed',sans-serif; font-size:1.4rem; font-weight:700; margin-bottom:4px; letter-spacing:.02em; }
.a-sub  { font-size:.78rem; color:rgba(255,255,255,.35); margin-bottom:20px; }
.a-list { list-style:none; display:flex; flex-direction:column; gap:9px; }
.a-list li {
  font-size:.83rem; line-height:1.5; color:#fff;
  padding-left:18px; position:relative;
}
.actor-arrow {
  display:flex; align-items:center; padding:0 6px;
  color:var(--c-primary); font-size:1.3rem; opacity:.5;
  align-self:center;
}

/* ── DEMO PASOS ── */
.steps-row { display:flex; width:100%; max-width:1100px; }
.step-btn {
  flex:1; padding:24px 20px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  cursor:pointer; transition:all .25s; text-align:left;
}
.step-btn:first-child { border-radius:6px 0 0 6px; }
.step-btn:last-child  { border-radius:0 6px 6px 0; }
.step-btn:hover:not(.active-step) { background:rgba(255,255,255,.07); }
.step-btn.active-step {
  background:rgba(237,109,2,.1); border-color:rgba(237,109,2,.4);
}
.step-n {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.84rem;
  background:rgba(255,255,255,.1); color:rgba(255,255,255,.35);
  margin-bottom:10px; transition:all .25s;
}
.step-btn.active-step .step-n { background:var(--c-primary); color:#fff; }
.step-lbl {
  font-family:'Barlow Condensed',sans-serif; font-size:.82rem; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase;
  color:rgba(255,255,255,.4); transition:color .25s;
}
.step-btn.active-step .step-lbl { color:#fff; }
.step-detail-box {
  width:100%; max-width:1100px;
  background:rgba(255,255,255,.04); border:1px solid rgba(237,109,2,.22);
  border-radius:6px; padding:36px; min-height:170px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.step-d-title { font-family:'Barlow Condensed',sans-serif; font-size:1.3rem; font-weight:700; color:var(--c-primary); margin-bottom:10px; letter-spacing:.02em; }
.step-d-text  { font-size:.9rem; line-height:1.7; color:#fff; max-width:680px; margin-bottom:16px; }
.tag-row { display:flex; flex-wrap:wrap; gap:7px; }
.tag {
  font-size:.68rem; font-weight:500; letter-spacing:.06em;
  padding:4px 12px; border-radius:100px;
}
.tag-orange { background:rgba(237,109,2,.18); color:var(--c-primary);  border:1px solid rgba(237,109,2,.28); }
.tag-teal   { background:rgba(0,137,123,.18); color:#4DB6AC;            border:1px solid rgba(0,137,123,.28); }
.tag-purple { background:rgba(123,31,162,.18); color:#CE93D8;           border:1px solid rgba(123,31,162,.28); }

/* ── APP MOVIL ── */
.app-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px; width:100%; max-width:1000px; }
.app-col-hdr {
  font-family:'Barlow Condensed',sans-serif; font-size:.82rem; font-weight:800;
  letter-spacing:.12em; text-transform:uppercase;
  padding:7px 18px; border-radius:30px; display:inline-block; margin-bottom:16px;
}
.app-item {
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  border-radius:6px; padding:18px 22px;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
  transition:border-color .25s; margin-bottom:12px;
}
.app-item:hover { border-color:rgba(255,255,255,.14); }
.app-item-phase { font-family:'Barlow Condensed',sans-serif; font-size:.86rem; font-weight:700; margin-bottom:5px; letter-spacing:.03em; }
.app-item-det   { font-size:.81rem; line-height:1.55; color:#fff; }

/* ── ROADMAP ── */
.roadmap-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; width:100%; max-width:1100px; position:relative; }
.roadmap-grid::before {
  content:''; position:absolute; top:40px; left:15%; right:15%; height:1px;
  background:linear-gradient(90deg, var(--c-primary), var(--c-secondary)); z-index:0;
}
.rm-col { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:6px; padding:30px; position:relative; z-index:1; box-shadow:0 4px 20px rgba(0,0,0,.25); }
.rm-col.now  { border-color:rgba(46,125,50,.4);  background:rgba(46,125,50,.07);  }
.rm-col.soon { border-color:rgba(237,109,2,.4);  background:rgba(237,109,2,.07);  }
.rm-col.mid  { border-color:rgba(0,137,123,.4);  background:rgba(0,137,123,.07);  }
.rm-badge {
  font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:800;
  letter-spacing:.14em; text-transform:uppercase;
  padding:5px 14px; border-radius:30px; display:inline-block; margin-bottom:6px;
}
.rm-col.now  .rm-badge { background:rgba(46,125,50,.3);  color:#81C784; }
.rm-col.soon .rm-badge { background:rgba(237,109,2,.3);  color:var(--c-primary); }
.rm-col.mid  .rm-badge { background:rgba(0,137,123,.3);  color:#4DB6AC; }
.rm-sub { font-size:.76rem; color:rgba(255,255,255,.3); margin-bottom:22px; }
.rm-list { list-style:none; display:flex; flex-direction:column; gap:11px; }
.rm-list li { font-size:.83rem; line-height:1.5; color:#fff; padding-left:20px; position:relative; }
.rm-col.now  .rm-list li::before { content:'✓'; position:absolute; left:0; color:#81C784; font-size:.72rem; }
.rm-col.soon .rm-list li::before { content:'→'; position:absolute; left:0; color:var(--c-primary); font-size:.72rem; }
.rm-col.mid  .rm-list li::before { content:'◆'; position:absolute; left:0; color:#4DB6AC; font-size:.5rem; top:5px; }

/* ── CIERRE ── */
#cierre { text-align:center; }
.cierre-h1 {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2.8rem,7vw,6rem); font-weight:800;
  line-height:.95; letter-spacing:-.01em;
}
.cierre-h1 em { color:var(--c-primary); font-style:normal; }
.cierre-sub { font-size:1rem; font-weight:300; color:rgba(255,255,255,.4); max-width:460px; line-height:1.65; margin:22px auto 44px; }
.next-grid { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; }
.next-item {
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  border-radius:30px; padding:14px 26px;
  font-size:.86rem; color:rgba(255,255,255,.65);
  transition:border-color .2s, background .2s;
}
.next-item:hover { border-color:rgba(237,109,2,.38); background:rgba(237,109,2,.07); color:#fff; }
.ni-arrow { color:var(--c-primary); font-weight:700; }
.cierre-foot { margin-top:56px; font-size:.76rem; color:rgba(255,255,255,.2); letter-spacing:.05em; }


/* ── FLUJO DEL PROCESO ── */
.flujo-row {
  display: flex; align-items: stretch; justify-content: center;
  gap: 0; width: 100%; max-width: 1200px; flex-wrap: nowrap;
}
.flujo-step {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
/* connector line between steps */
.flujo-step:not(:last-child)::after {
  content: ''; position: absolute;
  top: 52px; right: -18px;
  width: 36px; height: 2px;
  background: linear-gradient(90deg, var(--c-primary), rgba(237,109,2,.3));
  z-index: 2;
}
.flujo-icon-wrap {
  width: 80px; height: 80px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; margin-bottom: 16px; position: relative; z-index: 1;
  border: 2px solid rgba(255,255,255,.08);
  transition: transform .3s, box-shadow .3s;
}
.flujo-step:hover .flujo-icon-wrap {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,0,0,.3);
}
.flujo-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 8px; padding: 20px 16px;
  width: 100%; text-align: center;
  transition: border-color .3s, background .3s;
  flex: 1;
}
.flujo-step:hover .flujo-card {
  border-color: rgba(237,109,2,.35);
  background: rgba(237,109,2,.05);
}
.flujo-card-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: .86rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 10px; color: var(--c-primary);
}
.flujo-card-note {
  font-size: .72rem; color: rgba(255,255,255,.42);
  line-height: 1.55; font-style: italic;
  border-top: 1px solid rgba(255,255,255,.07);
  padding-top: 10px; margin-top: 8px;
}
.flujo-bullets { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.flujo-bullets li {
  font-size: .75rem; color: #fff;
  text-align: left; padding-left: 14px; position: relative; line-height: 1.45;
}
.flujo-bullets li::before { content:'·'; position:absolute; left:0; color:var(--c-primary); font-weight:700; }
.flujo-arrow-mobile { display:none; color:var(--c-primary); font-size:1.4rem; margin:8px 0; }

.flujo-img-wrap {
  width: 100%;
  max-width: 1100px;
  background: #ffffff;
  border-radius: 12px;
  padding: 32px 48px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.flujo-img {
  width: 100%; height: auto; display: block;
}
@media(max-width:900px){
  .flujo-img-wrap { padding: 20px 16px; }
}

/* ── ARQUITECTURA LMS → eFTI ── */
.arq-wrap {
  width: 100%; max-width: 1100px;
}
.arq-col {
  padding: 32px 28px; display: flex; flex-direction: column; gap: 14px;
}
.arq-col.lms   { background: rgba(237,109,2,.08); border-right: 1px solid rgba(255,255,255,.08); }
.arq-col.core  {
  background: rgba(255,255,255,.04);
  border-right: 1px solid rgba(255,255,255,.08);
  align-items: center; justify-content: center; text-align: center;
}
.arq-col.efti  { background: rgba(0,137,123,.08); }

.arq-col-label {
  font-size: .65rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 100px; display: inline-block; margin-bottom: 6px;
  align-self: flex-start;
}
.arq-col.lms  .arq-col-label { background: rgba(237,109,2,.25); color: var(--c-primary); }
.arq-col.core .arq-col-label { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); align-self:center; }
.arq-col.efti .arq-col-label { background: rgba(0,137,123,.25); color: #4DB6AC; }

.arq-col-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 700;
  line-height: 1.2; margin-bottom: 4px; letter-spacing: .02em;
}
.arq-item {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
  border-radius: 6px; padding: 14px 16px;
  transition: border-color .25s;
}
.arq-item:hover { border-color: rgba(255,255,255,.18); }
.arq-item-num {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .76rem;
  color: #fff; margin-bottom: 8px;
}
.arq-col.lms .arq-item-num { background: var(--c-primary); }
.arq-col.efti .arq-item-num { background: var(--c-secondary); }
.arq-item-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700;
  margin-bottom: 4px; letter-spacing: .02em;
}
.arq-item-desc {
  font-size: .77rem; color: rgba(255,255,255,.48); line-height: 1.5;
}
.arq-core-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 800;
  color: #fff; margin: 10px 0 6px; letter-spacing: .03em;
}
.arq-core-sub {
  font-size: .72rem; color: rgba(255,255,255,.4); margin-bottom: 20px; line-height: 1.5;
}
.arq-pill {
  font-size: .78rem; font-weight: 700; padding: 9px 16px;
  border-radius: 6px; margin: 4px 0; display: block; text-align: center;
  transition: background .2s; letter-spacing: .03em;
}
.arq-pill:hover { filter: brightness(1.15); }
.arq-pill.process  { background: rgba(237,109,2,.22);  color: var(--c-primary);  border: 1px solid rgba(237,109,2,.3); }
.arq-pill.store    { background: rgba(0,137,123,.22);  color: #4DB6AC;            border: 1px solid rgba(0,137,123,.3); }
.arq-pill.comm     { background: rgba(123,31,162,.22); color: #CE93D8;            border: 1px solid rgba(123,31,162,.3); }
.arq-badges {
  display: flex; gap: 8px; margin-top: 12px; justify-content: center; flex-wrap: wrap;
}
.arq-badge-icon {
  width: 40px; height: 40px; border-radius: 8px;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 700; color: rgba(255,255,255,.5);
}
.arq-footer-bar {
  width: 100%; max-width: 1100px;
  background: var(--c-primary); border-radius: 30px;
  padding: 14px 28px; text-align: center;
  font-family: 'Barlow Condensed', sans-serif; font-size: .95rem; font-weight: 700; color: #fff;
  letter-spacing: .06em; text-transform: uppercase;
}

/* ── Timeline (col. izquierda arquitectura) ── */
.arq-tl-wrap {
  position: relative;
  display: flex; flex-direction: column; gap: 12px;
}
.arq-tl-wrap::before {
  content: ''; position: absolute;
  left: 12px; top: 13px; bottom: 42px;
  width: 2px;
  background: linear-gradient(to bottom, var(--c-primary), rgba(237,109,2,.2));
  z-index: 0;
}
.arq-tl-item {
  display: flex; align-items: flex-start; gap: 14px; position: relative;
}
.arq-tl-num {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  background: var(--c-primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .82rem;
  z-index: 1; box-shadow: 0 0 0 4px rgba(237,109,2,.15);
}
.arq-tl-body {
  flex: 1;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
  border-radius: 6px; padding: 12px 14px;
  transition: border-color .25s;
}
.arq-tl-body:hover { border-color: rgba(255,255,255,.18); }
.arq-tl-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.arq-tl-icon { font-size: 1.4rem; opacity: .55; flex-shrink: 0; margin-top: 2px; }
.arq-tl-title { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700; margin-bottom: 4px; letter-spacing: .02em; }
.arq-tl-desc  { font-size: .77rem; color: rgba(255,255,255,.48); line-height: 1.5; }

/* DeCa badge */
.arq-deca-badge {
  display: inline-block; margin-left: 8px;
  font-size: .6rem; font-weight: 800; letter-spacing: .1em;
  padding: 2px 7px; border-radius: 4px;
  background: rgba(237,109,2,.3); color: var(--c-primary);
  vertical-align: middle;
}

/* Descripción col. central */
.arq-core-desc {
  font-size: .74rem; color: rgba(255,255,255,.38); line-height: 1.55;
  margin-bottom: 6px; padding: 0 4px;
}

/* Conector flecha entre items eFTI */
.arq-efti-connector {
  display: flex; align-items: center; justify-content: center;
  color: var(--c-secondary); font-size: 1rem; opacity: .65; padding: 2px 0;
}

/* Tags y badges col. derecha */
.arq-eu-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .67rem; font-weight: 600; letter-spacing: .03em;
  padding: 3px 9px; border-radius: 4px; margin-top: 8px;
  background: rgba(0,137,123,.18); color: #4DB6AC;
  border: 1px solid rgba(0,137,123,.28);
}
.arq-simple-badge {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: .78rem; font-weight: 800; letter-spacing: .06em;
  padding: 5px 12px; border-radius: 6px; margin-top: 8px;
  background: rgba(255,255,255,.07); color: #fff;
  border: 1.5px solid rgba(255,255,255,.22);
}
.arq-simple-dots { display: flex; gap: 3px; }
.arq-simple-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--c-secondary); }
.arq-xborder-tag {
  display: inline-block;
  font-size: .64rem; padding: 2px 8px; border-radius: 4px; margin-top: 6px;
  background: rgba(0,137,123,.14); color: #4DB6AC;
  border: 1px solid rgba(0,137,123,.22);
}

/* QR mini */
.arq-qr-wrap { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.arq-qr-svg  { border-radius: 4px; background: #fff; padding: 3px; flex-shrink: 0; }
.arq-qr-note { font-size: .71rem; color: rgba(255,255,255,.42); line-height: 1.45; }

@media(max-width:900px){
  .flujo-row { flex-direction:column; align-items:center; gap:8px; }
  .flujo-step::after { display:none; }
  .flujo-arrow-mobile { display:block; }
  .arq-wrap { grid-template-columns:1fr; }
  .arq-col { border-right:none!important; border-bottom:1px solid rgba(255,255,255,.08); }
}


@keyframes fadeUp  { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:none} }
@keyframes bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)} }

/* ── RESPONSIVE ── */
@media(max-width:900px){
  section{ padding:100px 24px 60px; }
  nav{ padding:16px 24px; }
  #nav-links{ display:none; }
  .reg-grid,.app-grid,.roadmap-grid{ grid-template-columns:1fr; }
  .actors-row{ flex-direction:column; gap:12px; }
  .actor-card{ border-radius:8px!important; }
  .actor-arrow{ display:none; }
  .steps-row{ flex-direction:column; gap:8px; }
  .step-btn{ border-radius:6px!important; }
  .roadmap-grid::before{ display:none; }
}
</style>
</head>
<body>

<div id="pb"></div>

<!-- NAV (generado por JS) -->
<nav>
  <div id="nav-brand"></div>
  <ul id="nav-links"></ul>
</nav>

<!-- HERO -->
<section id="hero" class="s-dark">
  <div class="hero-eye" id="hero-eye"></div>
  <h1 class="hero-h1" id="hero-h1"></h1>
  <p class="hero-sub-txt" id="hero-sub"></p>
  <div class="hero-cta" id="hero-cta"></div>
  <div class="hero-scroll"><div class="scroll-ln"></div>scroll</div>
</section>

<!-- REGULACION -->
<section id="regulacion" class="s-deep">
  <div class="s-hdr rv" id="reg-hdr"></div>
  <div class="reg-grid rv" id="reg-grid"></div>
  <div class="reg-note rv" id="reg-note"></div>
</section>

<!-- ACTORES -->
<section id="actores" class="s-dark">
  <div class="s-hdr rv" id="act-hdr"></div>
  <div class="actors-row rv" id="actors-row"></div>
</section>

<!-- FLUJO DEL PROCESO -->
<section id="flujo" class="s-deep">
  <div class="s-hdr rv" id="flujo-hdr"></div>
  <div class="flujo-row rv" id="flujo-row"></div>
</section>

<!-- ARQUITECTURA LMS → eFTI -->
<section id="arquitectura" class="s-dark">
  <div class="s-hdr rv" id="arq-hdr"></div>
  <div class="arq-wrap rv" id="arq-wrap"></div>
  <div class="arq-footer rv" id="arq-footer"></div>
</section>

<!-- DEMO PORTAL -->
<section id="demo" class="s-deep">
  <div class="s-hdr rv" id="demo-hdr"></div>
  <div class="steps-row rv" id="steps-row"></div>
  <div class="step-detail-box rv" id="step-detail"></div>
</section>

<!-- APP MOVIL -->
<section id="app" class="s-dark">
  <div class="s-hdr rv" id="app-hdr"></div>
  <div class="app-grid rv" id="app-grid"></div>
</section>

<!-- ROADMAP -->
<section id="roadmap" class="s-deep">
  <div class="s-hdr rv" id="rm-hdr"></div>
  <div class="roadmap-grid rv" id="rm-grid"></div>
</section>

<!-- CIERRE -->
<section id="cierre" class="s-black">
  <div class="rv" id="cierre-content"></div>
</section>

<script>
/* ═══════════════════════════════════════════════════════
   MOTOR DE RENDERIZADO
   ═══════════════════════════════════════════════════════ */

const NAV_SECTIONS = ['regulacion','actores','flujo','arquitectura','demo','app','roadmap'];
let activeCfg = CFG;
let tickInterval = null;
const cdIds = [];

/* ── IntersectionObserver (reveal on scroll) ── */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('vis'); });
}, { threshold: 0.12 });

/* ── Countdown ── */
function tick(){
  cdIds.forEach(({uid, deadline}) => {
    const diff = deadline - Date.now();
    ['d','h','m'].forEach(x => { const el = document.getElementById(`${uid}-${x}`); if(el && diff<=0) el.textContent='0'; });
    if(diff <= 0) return;
    const d = Math.floor(diff/864e5);
    const h = Math.floor((diff%864e5)/36e5);
    const m = Math.floor((diff%36e5)/6e4);
    const ed = document.getElementById(`${uid}-d`), eh = document.getElementById(`${uid}-h`), em = document.getElementById(`${uid}-m`);
    if(ed) ed.textContent = String(d).padStart(3,'0');
    if(eh) eh.textContent = String(h).padStart(2,'0');
    if(em) em.textContent = String(m).padStart(2,'0');
  });
}

/* ── setStep (demo tabs) ── */
function setStep(i){
  document.querySelectorAll('.step-btn').forEach((b,j)=>b.classList.toggle('active-step',j===i));
  const s = activeCfg.demo.steps[i];
  const tags = (s.tags||[]).map(t=>`<span class="tag tag-${t.color}">${t.label}</span>`).join('');
  document.getElementById('step-detail').innerHTML =
    `<div class="step-d-title">${s.title}</div>
     <p class="step-d-text">${s.desc}</p>
     <div class="tag-row">${tags}</div>`;
}

/* ── switchLang ── */
function switchLang(){ renderAll(activeCfg === CFG ? CFG_EN : CFG); }

/* ══════════════════════════════════════════════════════════════════
   renderAll(cfg) — renderiza toda la presentación con el cfg dado
   ══════════════════════════════════════════════════════════════════ */
function renderAll(cfg){
  activeCfg = cfg;
  const isEN = cfg === CFG_EN;

  /* CSS vars */
  const r = document.documentElement.style;
  r.setProperty('--c-primary',   cfg.brand.colorPrimary);
  r.setProperty('--c-secondary', cfg.brand.colorSecondary);
  r.setProperty('--c-dark',      cfg.brand.colorDark);

  /* ── NAV ── */
  document.getElementById('nav-brand').innerHTML =
    cfg.brand.name.split(' ').map((w,i) => i===1 ? `<em>${w}</em>` : w).join(' ');
  document.getElementById('nav-links').innerHTML =
    NAV_SECTIONS.map((id,i) => `<li><a href="#${id}">${cfg.nav.labels[i]}</a></li>`).join('') +
    `<li><button class="lang-btn" onclick="switchLang()">${isEN ? 'ES' : 'EN'}</button></li>`;

  /* ── HERO ── */
  document.getElementById('hero-eye').textContent = cfg.hero.eyebrow;
  document.getElementById('hero-h1').innerHTML = `${cfg.hero.title} <em>${cfg.hero.titleEM}</em>`;
  document.getElementById('hero-sub').textContent = cfg.hero.subtitle;
  document.getElementById('hero-cta').innerHTML =
    `<a href="${cfg.hero.ctaPrimary.href}"  class="btn-p">${cfg.hero.ctaPrimary.label}</a>
     <a href="${cfg.hero.ctaSecondary.href}" class="btn-o">${cfg.hero.ctaSecondary.label}</a>`;

  /* ── REGULACION ── */
  document.getElementById('reg-hdr').innerHTML =
    `<div class="s-label">${cfg.regulacion.sectionLabel}</div>
     <h2 class="s-title">${cfg.regulacion.sectionTitle.replace(/\n/g,'<br>')}</h2>
     <div class="accent-line accent-line-center"></div>`;

  cdIds.length = 0;
  document.getElementById('reg-grid').innerHTML = cfg.regulacion.cards.map((c,i) => {
    const uid = `cd${i}`;
    cdIds.push({ uid, deadline: c.deadline });
    const bg = `linear-gradient(135deg, ${c.accentColor}22 0%, ${c.accentColor}08 100%)`;
    const border = `1px solid ${c.accentColor}55`;
    const lblDays = isEN ? 'days' : 'días';
    const lblHrs  = isEN ? 'hours' : 'horas';
    return `
    <div class="reg-card" style="background:${bg};border:${border}">
      <span class="reg-flag">${c.flag}</span>
      <div class="reg-name">${c.title}</div>
      <div class="reg-sub">${c.subtitle}</div>
      <div class="cd-row">
        <div class="cd-unit"><span class="cd-n" id="${uid}-d" style="color:${c.accentColor}">—</span><span class="cd-lbl">${lblDays}</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-n" id="${uid}-h" style="color:${c.accentColor}">—</span><span class="cd-lbl">${lblHrs}</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-n" id="${uid}-m" style="color:${c.accentColor}">—</span><span class="cd-lbl">mins</span></div>
      </div>
      <ul class="reg-list">
        ${c.bullets.map(b=>`<li style="--acc:${c.accentColor}"
          onmouseover="this.style.color='#fff'"
          onmouseout="this.style.color=''">${b}</li>`).join('')}
      </ul>
      <span class="reg-badge" style="background:${c.accentColor}30;color:${c.accentColor};border:1px solid ${c.accentColor}40">${c.deadlineLabel}</span>
    </div>`;
  }).join('');

  document.getElementById('reg-note').innerHTML =
    cfg.regulacion.bottomNote
      ? `<div class="reg-note">${cfg.regulacion.bottomNote.replace(/(Zeus eDoc[^—]*)/,'<strong>$1</strong>')}</div>`
      : '';

  tick();
  if(tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(tick, 30000);

  /* ── ACTORES ── */
  document.getElementById('act-hdr').innerHTML =
    `<div class="s-label">${cfg.actores.sectionLabel}</div>
     <h2 class="s-title">${cfg.actores.sectionTitle.replace(/\n/g,'<br>')}</h2>
     <div class="accent-line accent-line-center"></div>
     <p class="s-sub" style="text-align:center;margin:10px auto 0">${cfg.actores.subtitle}</p>`;

  document.getElementById('actors-row').innerHTML = cfg.actores.items.map((a,i,arr) => {
    const arrow = i < arr.length-1 ? `<div class="actor-arrow" style="color:${a.color}">→</div>` : '';
    return `
    <div class="actor-card" style="border-top:3px solid ${a.color}">
      <div class="actor-ico" style="background:${a.color}28">${a.emoji}</div>
      <div class="a-role" style="color:${a.color}">${a.role}</div>
      <div class="a-name">${a.role}</div>
      <div class="a-sub">${a.sub}</div>
      <ul class="a-list">
        ${a.bullets.map(b=>`<li style="padding-left:18px">
          <span style="position:absolute;left:0;color:${a.color};font-size:.75rem">✓</span>${b}
        </li>`).join('')}
      </ul>
    </div>${arrow}`;
  }).join('');

  /* ── FLUJO ── */
  document.getElementById('flujo-hdr').innerHTML =
    `<div class="s-label">${cfg.flujo.sectionLabel}</div>
     <h2 class="s-title">${cfg.flujo.sectionTitle.replace(/\n/g,'<br>')}</h2>
     <div class="accent-line accent-line-center"></div>
     <p class="s-sub" style="text-align:center;margin:10px auto 0">${cfg.flujo.subtitle}</p>`;

  document.getElementById('flujo-row').innerHTML =
    `<div class="flujo-img-wrap">
       <img src="img/img2.png" alt="${cfg.flujo.sectionTitle}" class="flujo-img">
     </div>`;

  /* ── ARQUITECTURA ── */
  document.getElementById('arq-hdr').innerHTML =
    `<div class="s-label">${cfg.arquitectura.sectionLabel}</div>
     <h2 class="s-title">${cfg.arquitectura.sectionTitle.replace(/\n/g,'<br>')}</h2>
     <div class="accent-line accent-line-center"></div>
     <p class="s-sub" style="text-align:center;margin:10px auto 0">${cfg.arquitectura.subtitle}</p>`;

  document.getElementById('arq-wrap').innerHTML =
    `<div class="flujo-img-wrap">
       <img src="img/img3.png" alt="${cfg.arquitectura.sectionTitle}" class="flujo-img">
     </div>`;

  document.getElementById('arq-footer').innerHTML =
    `<div class="arq-footer-bar">${cfg.arquitectura.footerBar}</div>`;

  /* ── DEMO PASOS ── */
  document.getElementById('demo-hdr').innerHTML =
    `<div class="s-label">${cfg.demo.sectionLabel}</div>
     <h2 class="s-title">${cfg.demo.sectionTitle.replace(/\n/g,'<br>')}</h2>
     <div class="accent-line accent-line-center"></div>
     <p class="s-sub" style="text-align:center;margin:10px auto 0">${cfg.demo.subtitle}</p>`;

  document.getElementById('steps-row').innerHTML = cfg.demo.steps.map((s,i) =>
    `<div class="step-btn ${i===0?'active-step':''}" onclick="setStep(${i})">
      <div class="step-n">${i+1}</div>
      <div class="step-lbl">${s.short}</div>
    </div>`
  ).join('');
  setStep(0);

  /* ── APP MOVIL ── */
  document.getElementById('app-hdr').innerHTML =
    `<div class="s-label">${cfg.appMovil.sectionLabel}</div>
     <h2 class="s-title">${cfg.appMovil.sectionTitle.replace(/\n/g,'<br>')}</h2>
     <div class="accent-line accent-line-center"></div>`;

  document.getElementById('app-grid').innerHTML = cfg.appMovil.cols.map(col => `
    <div>
      <div class="app-col-hdr" style="background:${col.color}28;color:${col.color}">${col.title}</div>
      ${col.steps.map(s=>`
        <div class="app-item">
          <div class="app-item-phase" style="color:${col.color}">${s.phase}</div>
          <div class="app-item-det">${s.detail}</div>
        </div>`).join('')}
    </div>`).join('');

  /* ── ROADMAP ── */
  document.getElementById('rm-hdr').innerHTML =
    `<div class="s-label">${cfg.roadmap.sectionLabel}</div>
     <h2 class="s-title">${cfg.roadmap.sectionTitle.replace(/\n/g,'<br>')}</h2>
     <div class="accent-line accent-line-center"></div>`;

  document.getElementById('rm-grid').innerHTML = cfg.roadmap.phases.map(p => `
    <div class="rm-col ${p.style}">
      <span class="rm-badge">${p.phase}</span>
      <div class="rm-sub">${p.sub}</div>
      <ul class="rm-list">${p.items.map(item=>`<li>${item}</li>`).join('')}</ul>
    </div>`).join('');

  /* ── CIERRE ── */
  const ns = cfg.cierre.nextSteps.map(n =>
    `<div class="next-item"><span class="ni-arrow">→</span>${n}</div>`).join('');
  document.getElementById('cierre-content').innerHTML = `
    <h2 class="cierre-h1">${cfg.cierre.title}${cfg.cierre.titleEM?` <em>${cfg.cierre.titleEM}</em>`:''}</h2>
    <p class="cierre-sub">${cfg.cierre.subtitle}</p>
    <div class="next-grid">${ns}</div>
    <div class="cierre-foot">${cfg.brand.company} · ${cfg.brand.contact} · ${cfg.brand.date}</div>`;

  /* Re-observar reveal elements */
  document.querySelectorAll('.rv').forEach(el => obs.observe(el));
}

/* ── Arranque ── */
renderAll(CFG);

/* ── SCROLL: progress bar + nav active ── */
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
  document.getElementById('pb').style.width = pct + '%';
  let cur = '';
  document.querySelectorAll('section[id]').forEach(s => { if(window.scrollY >= s.offsetTop - 200) cur = s.id; });
  document.querySelectorAll('#nav-links a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#'+cur));
}, { passive: true });
</script>
</body>
</html>
